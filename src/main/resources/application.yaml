server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: aichat
  ai:
    openai:
      api-key: sk-3bc298da74e541d198403364325f040a
      base-url: http://192.168.0.82:8045/v1
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.7
  devtools:
    restart:
      enabled: true
      # 告诉 Spring 盯着这个文件夹，一旦里面的 .class 变了就重启
      additional-paths: build/classes/java/main
      # 排除掉不需要重启的路径
      # exclude: static/**,public/**,templates/**

logging:
  level:
    com.liuweiqing.aichat: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,beans,metrics,mappings"
