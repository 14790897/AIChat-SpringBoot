server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: aichat
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL}
      chat:
        options:
          model: ${AI_MODEL}
          temperature: 0.7
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  devtools:
    restart:
      enabled: true
      # 告诉 Spring 盯着这个文件夹，一旦里面的 .class 变了就重启
      additional-paths: build/classes/java/main
      # 排除掉不需要重启的路径
      # exclude: static/**,public/**,templates/**

logging:
  level:
    com.liuweiqing.aichat: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,beans,metrics,mappings"

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
