spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: test-api-key
      base-url: http://localhost:8888
      chat:
        options:
          model: test-model

jwt:
  secret: test-secret-key-for-unit-testing-only-1234567890
  expiration-ms: 86400000

logging:
  level:
    com.liuweiqing.aichat: DEBUG
